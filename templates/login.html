{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - Voltrix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card shadow-sm">
            <div class="card-body">
              <h3 class="card-title mb-3">Entrar na Voltrix</h3>
              <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                {% if form.errors %}
                  <div class="alert alert-danger">Usuário ou senha inválidos.</div>
                {% endif %}
                <div class="mb-3">
                  <label for="id_username" class="form-label">Email</label>
                  {{ form.username }}
                </div>
                <div class="mb-3">
                  <label for="id_password" class="form-label">Senha</label>
                  {{ form.password }}
                </div>
                <div class="d-flex justify-content-between align-items-center">
                  <button class="btn btn-primary">Entrar</button>
                  <a href="{% url 'admin:login' %}" class="btn btn-link">Entrar como administrador</a>
                </div>
              </form>
            </div>
          </div>
          <p class="text-center text-muted mt-3">Use o e-mail e senha de teste criados (SenhaPadrao123!)</p>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
