<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ produto.titulo }} - Voltrix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <nav class="navbar navbar-light bg-light">
      <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">Voltrix</a>
        <div>
          <a class="btn btn-outline-primary" href="{% url 'shop' %}">Entrar na loja</a>
          <a class="btn btn-primary" href="{% url 'login' %}">Fazer login</a>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <div class="row">
        <div class="col-md-6">
          <img src="{{ produto.image_url }}" class="img-fluid" alt="{{ produto.titulo }}">
        </div>
        <div class="col-md-6">
          <h1>{{ produto.titulo }}</h1>
          <h3 class="text-primary">R$ {{ produto.preco }}</h3>
          <p class="text-muted">Vendedor: {{ produto.vendedor.username }}</p>
          <p>{{ produto.descricao_completa }}</p>
          <a class="btn btn-success btn-lg" href="{% url 'shop' %}">Entrar na loja</a>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
